services:
  omp:
    build: .
    volumes:
      - ${WORKSPACE_DIR:-.}:/work
      - ${OMP_STATE_DIR:-$HOME/.omp}:/root/.omp
      - ${SSH_DIR:-$HOME/.ssh}:/root/.ssh:ro
      - ${GITCONFIG:-/dev/null}:/root/.gitconfig:ro
      - pip-cache:/root/.cache/pip
      - npm-cache:/root/.bun/install/cache
    environment:
      - TERM
      - LANG
      - LC_ALL
      - GIT_SIGNING_KEY
    # Required for iptables-based egress control (agent network sandboxing)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    stdin_open: true
    tty: true
    networks:
      - agent-net
    deploy:
      resources:
        limits:
          cpus: "${RESOURCE_CPUS:-2.0}"
          memory: "${RESOURCE_MEMORY:-4g}"

networks:
  agent-net:
    driver: bridge

volumes:
  pip-cache:
  npm-cache:
