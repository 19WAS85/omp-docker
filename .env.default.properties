# Oh My Pi Docker — Configuration
# Override any value by setting it as an environment variable or in a local .env.properties file.

WORKSPACE_DIR=.
OMP_STATE_DIR=$(HOME)/.omp
SSH_DIR=$(HOME)/.ssh
GIT_SIGNING_KEY=/root/.ssh/id_ed25519

# Resource limits
RESOURCE_CPUS=2.0
RESOURCE_MEMORY=4g

# Git identity — mount host ~/.gitconfig if present (auto-detected by Makefile)
GITCONFIG=$(HOME)/.gitconfig


# API keys and secrets: set in .env.properties (gitignored)
